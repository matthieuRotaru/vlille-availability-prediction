name: Integration Tests for Vlille Lambda

on:
  pull_request:
    paths:
      - 'data-ingestion/vlille/**'
      - 'docker-compose.yml'

jobs:
  integration-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5433:5432
        # The healthcheck is crucial to ensure tests don't start before the DB is ready
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pytest psycopg2-binary

      - name: Create init.sql for container
        run: cp data-ingestion/vlille/tests/init.sql ./init.sql

      - name: Run Integration Tests
        run: |
          # The PYTHONPATH is needed for imports to work correctly
          PYTHONPATH=data-ingestion/vlille pytest data-ingestion/vlille/tests/test_integration.py
        env:
          # These env vars are used by the test script to connect to the DB service
          DB_HOST: localhost
          DB_PORT: 5433
          DB_USER: testuser
          DB_PASS: testpassword
          DB_NAME: testdb
