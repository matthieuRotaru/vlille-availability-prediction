name: Test Vlille Lambda on PR

on:
  pull_request:
    paths: ['data-ingestion/vlille/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install test dependencies
        run: pip install pytest psycopg2-binary
      - name: Run tests
        run: PYTHONPATH=data-ingestion/vlille pytest data-ingestion/vlille/tests/test_unit.py
